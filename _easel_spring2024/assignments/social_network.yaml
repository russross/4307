description: |-
  <p>You should work with a partner on this project. Only one of you should submit, and that person should clearly identify both members of the group.</p>
  <p>In this project you should develop a simple social network and its database schema. It should include at least the following:</p>
  <ul>
  <li>Users/accounts (a name/username, email address, possibly other info)</li>
  <li>Relationships (one-way follows, two-way friendships, or something else)</li>
  <li>Posts of some kind (including a timestamp)</li>
  <li>Some other complicating factor (comments, likes/dislikes, filtering the feed, blocking users, etc.)</li>
  </ul>
  <p>Define the full database schema to capture your social network.</p>
  <p>In addition, create a series of Python scripts to perform basic operations:</p>
  <ul>
  <li>Creating users</li>
  <li>Adding relationships between users</li>
  <li>Posting for a user</li>
  <li>Checking the feed for a user (the most recent&nbsp;<em>n</em> posts of people that user follows)</li>
  <li>Other interactions to use your additional features</li>
  </ul>
  <p>Each script can do a single interaction or you can structure it some other way. I suggest then writing simple shell scripts to build up your database. Such a script could just call your Python scripts in sequence to build up your network of people and posts. This will make testing a lot easier if you can blow away your database and recreate it with only a couple commands.</p>
  <p>You must also implement at least two "interesting" queries on that database you have created. These should do something challenging beyond the basic "select .. from .. join .. where .. group by .. having .. order by" form. Be creative! Show off!</p>
  <p>We will discuss additional details in class.</p>
  <p>You are expected to submit two things:</p>
  <ol>
  <li>All of your code, including a README file that explains how to run your tests</li>
  <li>A screencast where you and your partner explain your social network, demonstrate it working, and discuss the database queries you created. You should explain the choices you made in your database schema as well as your "interesting" queries.</li>
  </ol>
